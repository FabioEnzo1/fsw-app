services:
  db:
    image: postgres:18
    container_name: bsw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bsw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bsw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: